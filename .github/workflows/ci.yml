name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && echo "MongoDB is ready" && break
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Start backend server and verify it runs
        working-directory: ./backend
        run: |
          node server.js &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          sleep 10
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server process is running"
            if nc -z localhost 5000; then
              echo "Port 5000 is listening"
              kill $SERVER_PID
            else
              echo "Port 5000 is not listening"
              kill $SERVER_PID
              exit 1
            fi
          else
            echo "Server failed to start"
            exit 1
          fi
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/travel-agency-test
          JWT_SECRET: test-secret

      - name: Run backend tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/travel-agency-test
          JWT_SECRET: test-secret
          AI_API_TYPE: huggingface
          HUGGINGFACE_API_KEY: dummy-key
          HUGGINGFACE_MODEL: dummy-model
          HUGGINGFACE_PROVIDER: dummy-provider
          HUGGINGFACE_IMAGE_MODEL: dummy-image-model
          POE_API_KEY: dummy-poe-key
          POE_API_URL: https://dummy.com
          POE_MODEL: dummy-model
        run: npm test -- --runInBand

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage